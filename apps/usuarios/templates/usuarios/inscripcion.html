{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción - El Potrero</title>
    <link rel="stylesheet" href="{% static 'usuarios/css/inscripcion.css' %}">
</head>
<body class="theme-negro-dorado">

    <header>
        <img src="{% static 'core/img/LOGOFUTBOL.png' %}" alt="El Potrero" class="logo">
        <h1>Formulario de Inscripción ⚽</h1>
    </header>

    <main>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="nombre">Nombre del alumno</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="edad">Edad</label>
                <input type="number" id="edad" name="edad" min="5" max="18" required>
            </div>

            <div class="form-group">
                <label for="apoderado">Nombre del apoderado</label>
                <input type="text" id="apoderado" name="apoderado" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono de contacto</label>
                <input type="text" id="telefono" name="telefono" required>
            </div>

            <div class="form-group">
                <label for="programa">Programa</label>
                <select id="programa" name="programa" required>
                    {% for programa in programas %}
                        <option value="{{ programa.id }}">{{ programa.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-inscripcion">Inscribirse</button>
        </form>
    </main>

    <footer>
        <p>© 2026 Escuela de Fútbol El Potrero</p>
    </footer>

</body>
</html>
