{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - El Potrero</title>
    <link rel="stylesheet" href="{% static 'core/css/public.css' %}">
</head>
<body>
    <div class="auth-container">
        <h1>Iniciar Sesión ⚽</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
        <p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
    </div>
</body>
</html>
